<section class="pt-32 pb-24 px-6 max-w-7xl mx-auto">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
    <div>
      <h1 class="text-5xl font-serif mb-8 text-[#4b1248]">Contact Us</h1>
      <p class="text-gray-600 mb-12 leading-relaxed">Have questions or ready to start planning your dream wedding? Get in touch with us today. Our team is here to help you every step of the way.</p>
      
      <div class="space-y-8">
        <div class="flex items-start">
          <div class="w-12 h-12 bg-[#fad6d6]/30 rounded-full flex items-center justify-center mr-6">
            <svg class="w-6 h-6 text-[#ff5757]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
          </div>
          <div>
            <h4 class="text-lg font-serif mb-1">Phone</h4>
            <p class="text-gray-500">+91 98765 43210</p>
          </div>
        </div>
        <div class="flex items-start">
          <div class="w-12 h-12 bg-[#fad6d6]/30 rounded-full flex items-center justify-center mr-6">
            <svg class="w-6 h-6 text-[#ff5757]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
          </div>
          <div>
            <h4 class="text-lg font-serif mb-1">Email</h4>
            <p class="text-gray-500">hello@shaadime.com</p>
          </div>
        </div>
        <div class="flex items-start">
          <div class="w-12 h-12 bg-[#fad6d6]/30 rounded-full flex items-center justify-center mr-6">
            <svg class="w-6 h-6 text-[#ff5757]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
          </div>
          <div>
            <h4 class="text-lg font-serif mb-1">Office</h4>
            <p class="text-gray-500">123 Wedding Lane, Bengaluru, India</p>
          </div>
        </div>
      </div>
    </div>

    <div class="bg-white p-10 rounded-[3rem] shadow-xl border border-[#fad6d6]/30">
      <h3 class="text-3xl font-serif mb-8 text-[#4b1248]">Send a Message</h3>
      <form class="space-y-6" (ngSubmit)="submitContact()">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-sm font-medium text-gray-700">Name</label>
            <input type="text" placeholder="Your Name" class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-[#ff5757] outline-none" [(ngModel)]="contactForm.name" name="name">
          </div>
          <div class="space-y-2">
            <label class="text-sm font-medium text-gray-700">Email</label>
            <input type="email" placeholder="Your Email" class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-[#ff5757] outline-none" [(ngModel)]="contactForm.email" name="email">
          </div>
        </div>
        <div class="space-y-2">
<label class="text-sm font-medium text-gray-700">Subject</label>
            <input type="text" placeholder="Subject" class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-[#ff5757] outline-none" [(ngModel)]="contactForm.subject" name="subject">
        </div>
        <div class="space-y-2">
<label class="text-sm font-medium text-gray-700">Message</label>
            <textarea rows="5" placeholder="Your Message" class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-[#ff5757] outline-none resize-none" [(ngModel)]="contactForm.message" name="message"></textarea>
        </div>
        <button class="w-full py-5 bg-[#ff5757] text-white rounded-full font-medium hover:bg-[#ff5757]/90 transition-all shadow-lg shadow-[#ff5757]/20">Send Message</button>
      </form>
    </div>
  </div>
</section>
