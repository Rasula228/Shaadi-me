<section class="pt-32 pb-24 px-6 max-w-7xl mx-auto">
  <div class="mb-16">
    <h1 class="text-5xl font-serif mb-6 text-[#4b1248]">Destinations</h1>
    <p class="text-gray-500 max-w-2xl">From serene beaches to historic palaces, we help you choose the perfect destination for your wedding. Our team handles all travel and logistics.</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
    <div *ngFor="let dest of ['Bali', 'Goa', 'Tuscany', 'Santorini', 'Amalfi Coast', 'Maldives']" class="group cursor-pointer">
<div class="relative h-96 rounded-3xl overflow-hidden mb-6">
         <img src="https://images.unsplash.com/photo-1544124499-58912cbddaad?auto=format&fit=crop&q=80&w=800" alt="Destination" class="w-full h-full object-cover group-hover:scale-105 transition-all duration-700" referrerPolicy="no-referrer">
       </div>
      <h3 class="text-2xl font-serif mb-2">{{dest}}</h3>
      <p class="text-gray-500 text-sm italic">Exotic locations for a unique experience.</p>
    </div>
  </div>
</section>
