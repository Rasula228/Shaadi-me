<nav
  class="site-nav"
>
  <div class="nav-shell">
    <div class="nav-inner">
      <a routerLink="/" class="nav-logo-wrap" (click)="closeMenu()">
        <img src="ShaadiMe_Logo.png" alt="ShaadiMe" class="nav-logo" />
      </a>

      <div class="nav-links" aria-label="Primary">
        <a *ngFor="let item of navItems" [href]="item.href" (click)="closeMenu()">{{ item.label }}</a>
      </div>

      <div class="nav-right">
        <button
          type="button"
          class="btn-primary cta-primary nav-cta"
          (click)="openPlanner()"
        >
          Start Planning →
        </button>
        <button
          type="button"
          (click)="toggleMenu()"
          class="hamburger"
          aria-label="Toggle menu"
          [attr.aria-expanded]="isMenuOpen"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="isMenuOpen" class="mobile-menu">
    <a *ngFor="let item of navItems" [href]="item.href" (click)="closeMenu()">{{ item.label }}</a>
    <button
      type="button"
      class="btn-primary cta-primary landing-btn-mobile"
      (click)="openPlanner()"
    >
      Start Planning
    </button>
  </div>
</nav>
