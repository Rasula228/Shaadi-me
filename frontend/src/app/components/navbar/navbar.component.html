<nav class="site-nav">
  <div class="nav-shell">
    <div class="nav-inner">
      <a routerLink="/" class="nav-logo-wrap" (click)="closeMenu()">
        <img ngSrc="ShaadiMe_Logo.png" alt="ShaadiMe" class="nav-logo" width="1600" height="318" priority />
      </a>

      <ul class="nav-links" role="list" aria-label="Main navigation">
        <li *ngFor="let item of navItems">
          <a routerLink="/" [fragment]="item.fragment" (click)="closeMenu()">{{ item.label }}</a>
        </li>
      </ul>

      <div class="nav-right">
        <button
          *ngIf="!isContactPage"
          type="button"
          class="btn-primary cta-primary nav-cta"
          routerLink="/plan"
          (click)="closeMenu()"
        >
          Start Planning →
        </button>
        <button
          type="button"
          (click)="toggleMenu()"
          class="hamburger"
          aria-label="Toggle menu"
          [attr.aria-expanded]="isMenuOpen"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="isMenuOpen" class="mobile-menu">
    <a
      *ngFor="let item of navItems"
      routerLink="/"
      [fragment]="item.fragment"
      (click)="closeMenu()"
      >{{ item.label }}</a
    >
    <button
      *ngIf="!isContactPage"
      type="button"
      class="btn-primary cta-primary landing-btn-mobile"
      routerLink="/plan"
      (click)="closeMenu()"
    >
      Start Planning
    </button>
  </div>
</nav>
