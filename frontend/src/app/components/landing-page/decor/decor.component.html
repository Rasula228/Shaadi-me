<section id="decor" class="section section-decor">
  <div class="section-inner">
    <div class="section-header">
      <div>
        <p class="section-label">✦ Décor Styles</p>
        <h2 class="section-title">
          Set the mood before
          <br />
          a single guest <em>arrives</em>
        </h2>
      </div>

      <p class="section-sub">
        From lush florals to minimal elegance, tell us the vibe you're going for and we'll bring a look that guests can feel the moment they walk in.
      </p>
    </div>

    <div class="decor-shell">
      <div class="decor-bento">
      <article
        *ngFor="let style of styles; let i = index"
        class="decor-card"
        [attr.data-card]="i"
      >
        <div class="decor-img-wrap">
          <img
            [ngSrc]="style.image"
            [alt]="style.name"
            fill
            referrerpolicy="no-referrer"
          />
        </div>
        <div class="decor-overlay">
          <span class="decor-index">0{{ i + 1 }}</span>
          <span class="decor-overlay-name">{{ style.name }}</span>
          <span class="decor-overlay-desc">{{ style.shortDescription }}</span>
        </div>
      </article>
      </div>
    </div>
  </div>
</section>
